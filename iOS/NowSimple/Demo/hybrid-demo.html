<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bundle Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f2;
      --card: rgba(255, 255, 255, 0.82);
      --text: #162033;
      --muted: #5d6679;
      --accent: #b45309;
      --accent-soft: color-mix(in srgb, var(--accent) 14%, white);
      --border: rgba(22, 32, 51, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(140deg, #fff7ed 0%, var(--bg) 45%, #eef6ff 100%);
      color: var(--text);
    }
    .shell {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .hero, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 22px 50px rgba(22, 32, 51, 0.08);
      backdrop-filter: blur(10px);
    }
    .hero {
      padding: 28px;
      display: grid;
      gap: 12px;
    }
    .eyebrow {
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.02;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      text-align: left;
      font: inherit;
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border);
    }
    button strong {
      display: block;
      margin-bottom: 4px;
    }
    button span {
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      padding: 18px 20px;
    }
    pre {
      margin: 0;
      padding: 16px;
      min-height: 220px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-radius: 18px;
      background: #101827;
      color: #d9e7ff;
      font: 13px/1.5 "SFMono-Regular", ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">NowHybrid bundle</div>
      <h1>Bundle Demo</h1>
      <p>This page is bundled inside the app and loaded through <code>localx://bundle/...</code>. Use the actions below to verify native bridge calls and shared storage.</p>
    </section>
    <section class="grid">
      <button onclick="callBridge('echo', 'hello-bundle')">
        <strong>Sync Echo</strong>
        <span>Calls the custom demo bridge and returns immediately.</span>
      </button>
      <button onclick="callBridge('delayedEcho', 'delayed-bundle')">
        <strong>Async Echo</strong>
        <span>Waits briefly on native side before sending the callback.</span>
      </button>
      <button onclick="saveStorage()">
        <strong>Save Storage</strong>
        <span>Persists a value through <code>NowJsBridge</code>.</span>
      </button>
      <button onclick="getStorage()">
        <strong>Read Storage</strong>
        <span>Reads the same key back from native storage.</span>
      </button>
      <button onclick="callBridge('deviceInfo', '')">
        <strong>Device Info</strong>
        <span>Returns simple runtime information from the app.</span>
      </button>
    </section>
    <section class="panel">
      <pre id="log">Waiting for bridge actions...</pre>
    </section>
  </div>
  <script>
    const logElement = document.getElementById('log');
    function logLine(label, payload) {
      const text = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
      logElement.textContent = `[${new Date().toLocaleTimeString()}] ${label}\n${text}\n\n` + logElement.textContent;
    }
    window.demoCallbacks = {
      handle(response) {
        logLine('callback', response);
      }
    };
    function callBridge(methodName, params) {
      window.jsBridge.invokeNativeMethod({
        methodName,
        params,
        callbackId: 'window.demoCallbacks.handle'
      });
    }
    function saveStorage() {
      window.jsBridge.invokeNativeMethod({
        methodName: 'saveStorage',
        params: JSON.stringify({
          key: 'demo_key_bundle',
          value: 'saved-from-bundle',
          encrypted: false
        }),
        callbackId: 'window.demoCallbacks.handle'
      });
    }
    function getStorage() {
      window.jsBridge.invokeNativeMethod({
        methodName: 'getStorage',
        params: JSON.stringify({
          key: 'demo_key_bundle',
          encrypted: false
        }),
        callbackId: 'window.demoCallbacks.handle'
      });
    }
    logLine('ready', 'Bridge name: jsBridge');
  </script>
</body>
</html>
